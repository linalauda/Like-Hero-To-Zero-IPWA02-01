<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Freigabe ausstehender Einträge – Like Hero To Zero</title>
</h:head>

<h:body>
    <h1>Ausstehende CO2-Einträge zur Freigabe</h1>
    <p>Angemeldet als <b>#{publisherAuthBean.loggedInPublisher.username}</b></p>

    <h:form>
        <p:commandButton value="Abmelden" action="#{publisherAuthBean.logout}"/>
    </h:form>

    <h:form id="reviewForm">
        <p:messages/>

        <p:dataTable value="#{reviewBean.pendingEntries}" var="entry"
                     paginator="true" rows="10"
                     emptyMessage="Keine ausstehenden Einträge">

            <p:column headerText="Land">
                <h:outputText value="#{entry.country.name}"/>
            </p:column>

            <p:column headerText="Jahr">
                <h:outputText value="#{entry.year}"/>
            </p:column>

            <p:column headerText="CO2 (kt)">
                <h:outputText value="#{entry.co2Kt}"/>
            </p:column>

            <p:column headerText="Eingereicht am">
                <h:outputText value="#{entry.createdAt}"/>
            </p:column>

            <p:column headerText="Aktionen">
                <p:commandButton value="Freigeben"
                                 actionListener="#{reviewBean.approve(entry)}"
                                 update=":reviewForm"/>
                <p:commandButton value="Ablehnen"
                                 actionListener="#{reviewBean.reject(entry)}"
                                 update=":reviewForm"
                                 style="margin-left: 8px;"/>
            </p:column>

        </p:dataTable>
    </h:form>

    <br/>
    <h:link value="Zurück zur Startseite" outcome="/index.xhtml"/>

</h:body>
</html>
